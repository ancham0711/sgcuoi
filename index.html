
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Cưới Online - Thế Vương & Ngọc Nên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+Vithkuqi:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            scroll-behavior: smooth;
            background-color: #ffffff;
            overflow-x: hidden;
        }
        .font-wedding {
            font-family: 'Pinyon Script', cursive;
        }
        .font-calligraphy {
            font-family: 'Great Vibes', cursive;
        }
        .font-serif-elegant {
            font-family: 'Playfair Display', serif;
        }
        /* Font chữ mới cho tên chính - Rõ ràng và Sang trọng */
        .font-name {
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 700;
        }
        
        /* Hiệu ứng nhung đỏ cho cánh thiệp */
        .bg-red-velvet {
            background-color: #991b1b;
            background-image: url("https://www.transparenttextures.com/patterns/pinstriped-suit.png");
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        /* Chữ vàng kim loại lấp lánh */
        .gold-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }

        /* Animation cánh thiệp mở ra 2 bên */
        .door-left {
            transition: transform 2.2s cubic-bezier(0.77, 0, 0.175, 1);
            transform-origin: left;
        }
        .door-right {
            transition: transform 2.2s cubic-bezier(0.77, 0, 0.175, 1);
            transform-origin: right;
        }
        .doors-open .door-left {
            transform: translateX(-100%);
        }
        .doors-open .door-right {
            transform: translateX(100%);
        }

        @keyframes gold-glow {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 5px rgba(255,215,0,0.3)); }
            50% { filter: brightness(1.4) drop-shadow(0 0 20px rgba(255,215,0,0.6)); }
        }
        .animate-gold {
            animation: gold-glow 3s infinite ease-in-out;
        }

        .shadow-luxury {
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.2), 0 18px 36px -18px rgba(0,0,0,0.3);
        }

        /* Hiệu ứng hoa văn cổ điển */
        .pattern-overlay {
            background-image: url("https://www.transparenttextures.com/patterns/gray-floral.png");
            opacity: 0.05;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="text-gray-800">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
